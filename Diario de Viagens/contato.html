<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <header>
    <nav>
      <ul>
        <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <div class="container">
        <h1><i class="fas fa-envelope"></i> Contato</h1>

        <p>Quer trocar ideia ou entrar no grupo? Só mandar mensagem 👇</p>

        <form>
          <label>Nome:</label><br>
          <input type="text" placeholder="Seu nome"><br><br>

          <label>Email:</label><br>
          <input type="email" placeholder="Seu email"><br><br>

          <label>Mensagem:</label><br>
          <textarea placeholder="Digite sua mensagem"></textarea><br><br>

          <button type="submit">
            <i class="fas fa-paper-plane"></i> Enviar
          </button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 - Página de Contato</p>
  </footer>

</body>
</html>
